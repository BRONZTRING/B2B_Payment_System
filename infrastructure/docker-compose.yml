services:
  db:
    image: postgres:15-alpine
    container_name: b2b_postgres
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: b2b_payment_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d b2b_payment_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  anvil:
    image: ghcr.io/foundry-rs/foundry:latest
    container_name: b2b_anvil
    command: ["anvil", "--host", "0.0.0.0", "--block-time", "1", "--cors-allow-origin", "*"]
    ports:
      - "8545:8545"

  ai_service:
    build:
      context: ../ai_service
      dockerfile: Dockerfile
    container_name: b2b_ai
    ports:
      - "8000:8000"
    volumes:
      - ../ai_service:/app
    environment:
      - PYTHONUNBUFFERED=1

volumes:
  postgres_data:
